name: Deploy static PWA to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime config
        run: |
          printf 'window.VOICE_WALL_CONFIG = {\n  SUPABASE_URL: "%s",\n  SUPABASE_ANON_KEY: "%s",\n  SUPABASE_BUCKET: "%s",\n  SUPABASE_TABLE: "%s"\n};\n' \
            "$SUPABASE_URL" \
            "$SUPABASE_ANON_KEY" \
            "${SUPABASE_BUCKET:-voice-notes}" \
            "${SUPABASE_TABLE:-shared_notes}" > config.js
        env:
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_BUCKET: ${{ vars.SUPABASE_BUCKET }}
          SUPABASE_TABLE: ${{ vars.SUPABASE_TABLE }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
