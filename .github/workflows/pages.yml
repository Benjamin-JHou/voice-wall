name: Deploy static PWA to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate runtime config
        run: |
          cat > config.js <<'CONFIG'
          window.VOICE_WALL_CONFIG = {
            SUPABASE_URL: "${{ vars.SUPABASE_URL }}",
            SUPABASE_ANON_KEY: "${{ secrets.SUPABASE_ANON_KEY }}",
            SUPABASE_BUCKET: "${{ vars.SUPABASE_BUCKET || 'voice-notes' }}",
            SUPABASE_TABLE: "${{ vars.SUPABASE_TABLE || 'shared_notes' }}"
          };
          CONFIG

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
