<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101510" />
    <meta name="description" content="Record voice notes under 60 seconds and share them with QR codes that play instantly when scanned." />
    <title>Voice Wall | Voice Notes with QR Sharing</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./assets/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./assets/icon.svg" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./config.js"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  </head>
  <body>
    <div id="app" class="app-shell"></div>
    <template id="note-template">
      <article class="note-card">
        <div class="note-ornament"></div>
        <div class="note-meta"></div>
        <h3></h3>
        <p></p>
        <div class="note-actions"></div>
      </article>
    </template>
    <script src="./app.js" type="module"></script>
  </body>
</html>
